# .github/workflows/ci.yml
# =============================================================
# Locate Anything Assistant — Continuous Integration
# =============================================================
# Runs on every push and pull request to main / dev branches.
#
# Jobs:
#   lint-backend    : ruff (linting) + syntax check
#   test-backend    : pytest (no GPU, model mocked)
#   build-frontend  : npm install + vite build
#   docker-build    : docker build both images (no push)
# =============================================================

name: CI

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:

  # ──────────────────────────────────────────────────────────
  # 1. Backend linting and syntax
  # ──────────────────────────────────────────────────────────
  lint-backend:
    name: "Backend — Lint & Syntax"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff

      - name: Syntax check (ast.parse)
        working-directory: backend
        run: |
          python3 -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('app'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          ast.parse(open(path).read())
                      except SyntaxError as e:
                          errors.append(f'{path}:{e.lineno}: {e.msg}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All Python files syntax-OK')
          "

      - name: Ruff lint
        working-directory: backend
        run: |
          ruff check app/ --select E,F,W,I --ignore E501,F401
        continue-on-error: true   # warn but don't block on style issues

  # ──────────────────────────────────────────────────────────
  # 2. Backend tests (no GPU)
  # ──────────────────────────────────────────────────────────
  test-backend:
    name: "Backend — Pytest (no GPU)"
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install CPU-only torch
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run tests
        working-directory: backend
        env:
          MODEL_PATH: nvidia/LocateAnything-3B
          DEVICE: cpu
          TORCH_DTYPE: float32
          HF_TOKEN: ""                 # not needed — model is mocked in tests
          CORS_ORIGINS: "http://localhost:5173"
          LOG_LEVEL: warning           # reduce noise in CI
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -m "not gpu and not slow"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ──────────────────────────────────────────────────────────
  # 3. Frontend build
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: "Frontend — Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

      - name: Check bundle output exists
        run: |
          test -d frontend/dist
          test -f frontend/dist/index.html
          echo "Frontend build OK"

  # ──────────────────────────────────────────────────────────
  # 4. Docker build (no push)
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: "Docker — Build images"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (CPU)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: locate-anything-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: locate-anything-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
