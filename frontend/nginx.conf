# /etc/nginx/conf.d/default.conf
# Serves the Vite/React SPA and proxies /detect /chat /health to the backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for JS/CSS.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite adds content hashes to filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the FastAPI backend.
    # The backend hostname "backend" resolves via Docker Compose DNS.
    location ~ ^/(health|detect|chat|docs|redoc|openapi.json) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large timeouts for slow inference.
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
        proxy_connect_timeout  10s;

        # Required for multipart file uploads.
        client_max_body_size 25M;
    }

    # SPA fallback — all non-asset routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
