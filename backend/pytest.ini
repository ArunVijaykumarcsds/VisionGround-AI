[pytest]
# =============================================================
# Locate Anything Assistant — pytest configuration
# =============================================================
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short traceback for known errors; full for unexpected ones
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

markers =
    asyncio: marks tests as async (applied automatically via asyncio_mode=auto)
    slow: marks tests that are slow to run (e.g. require model load)
    gpu: marks tests that require a GPU
